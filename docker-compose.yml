
services:
  # 1. Local Blockchain Node (Hardhat) - Mostly for Staging/Testing
  blockchain:
    image: subodh40/lastwish-blockchain:latest
    build:
      context: ./
      dockerfile: Dockerfile.hardhat
      network: host
    container_name: lastwish_blockchain
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/app/contracts
      - ./scripts:/app/scripts
      - ./test:/app/test
      - ./hardhat.config.ts:/app/hardhat.config.ts
    environment:
      - NODE_ENV=development
    networks:
      - protocol_net

