services:
  # 1. Local Blockchain Node (Hardhat) - Mostly for Staging/Testing
  blockchain:
    image: subodh40/alwaysthere-blockchain:latest
    build:
      context: ./
      dockerfile: Dockerfile.hardhat
    container_name: alwaysthere_blockchain
    network_mode: host
    volumes:
      - ./contracts:/app/contracts
      - ./scripts:/app/scripts
      - ./test:/app/test
      - ./hardhat.config.ts:/app/hardhat.config.ts
    environment:
      - NODE_ENV=development

  # 4. PostgreSQL Database (For Drizzle ORM)
  postgres:
    image: postgres:15-alpine
    container_name: alwaysthere_db
    network_mode: host
    command: -p 5434
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alwaysthere
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 5. MongoDB (For legacy services)
  mongodb:
    image: mongo:7.0
    container_name: alwaysthere_mongodb
    network_mode: host
    command: mongod --port 27018 --bind_ip_all
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: digital-will
    volumes:
      - mongodb_data:/data/db

  # 6. Redis (For Caching/Pulse logs)
  redis:
    image: redis:7-alpine
    container_name: alwaysthere_redis
    network_mode: host
    volumes:
      - redis_data:/data

  # 7. Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: alwaysthere_prometheus
    network_mode: host
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # 8. Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: alwaysthere_grafana
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_HTTP_PORT=3001

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
