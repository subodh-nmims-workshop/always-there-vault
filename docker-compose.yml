  # 4. PostgreSQL Database (For Drizzle ORM)
  postgres:
    image: postgres:15-alpine
    container_name: lastwish_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lastwish
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - protocol_net

  # 5. MongoDB (For legacy services)
  mongodb:
    image: mongo:7.0
    container_name: lastwish_mongodb
    ports:
      - "27018:27017"
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: digital-will
    networks:
      - protocol_net

  # 6. Redis (For Caching/Pulse logs)
  redis:
    image: redis:7-alpine
    container_name: lastwish_redis
    ports:
      - "6379:6379"
    networks:
      - protocol_net

  # 7. Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: lastwish_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - protocol_net

  # 8. Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: lastwish_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - protocol_net

  # 9. Certbot (SSL Certificate Auto-Renewal)
  certbot:
    image: certbot/certbot
    container_name: lastwish_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - protocol_net

networks:
  protocol_net:
    driver: bridge

volumes:
  postgres_data:
