version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: deadman-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: digital-will
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - deadman-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend (Secondary)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deadman-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 7001
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/digital-will?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "7001:7001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - deadman-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Hardhat Node (Primary Backend)
  hardhat:
    build:
      context: ./backend-full-decentralised
      dockerfile: Dockerfile
    container_name: deadman-hardhat
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "8545:8545"
    networks:
      - deadman-network
    volumes:
      - ./backend-full-decentralised:/app
      - /app/node_modules

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: deadman-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:7001}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "7000:7000"
    depends_on:
      - backend
      - hardhat
    networks:
      - deadman-network
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
      - /app/.next

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: deadman-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - deadman-network

networks:
  deadman-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
