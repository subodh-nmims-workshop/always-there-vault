version: '3.8'

services:
  # 1. Local Blockchain Node (Hardhat) - Mostly for Staging/Testing
  blockchain:
    image: subodh40/lastwish-blockchain:latest
    build:
      context: ./
      dockerfile: Dockerfile.hardhat
      network: host
    container_name: lastwish_blockchain
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/app/contracts
      - ./scripts:/app/scripts
      - ./test:/app/test
      - ./hardhat.config.ts:/app/hardhat.config.ts
    environment:
      - NODE_ENV=development
    networks:
      - protocol_net

  # 2. Next.js Web Dashboard
  web:
    image: subodh40/lastwish-web:latest
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      network: host
    container_name: lastwish_web
    ports:
      - "7000:7000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:7001
      - NEXT_PUBLIC_CHAIN_ID=31337
      - NEXT_PUBLIC_RPC_URL=http://blockchain:8545
      - NODE_ENV=production
    depends_on:
      - backend
      - blockchain
    networks:
      - protocol_net

  # 3. NestJS Backend API
  backend:
    image: subodh40/lastwish-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: lastwish_backend
    ports:
      - "7001:7001"
    environment:
      - NODE_ENV=production
      - PORT=7001
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/lastwish}
      - RPC_URL=http://blockchain:8545
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - postgres
      - blockchain
    networks:
      - protocol_net

  # 4. PostgreSQL Database (For Drizzle ORM)
  postgres:
    image: postgres:15-alpine
    container_name: lastwish_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lastwish
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - protocol_net

  # 5. MongoDB (For legacy services)
  mongodb:
    image: mongo:7.0
    container_name: lastwish_mongodb
    # Removed host port mapping to avoid 27017 conflict with existing smarttech-mongodb
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: digital-will
    networks:
      - protocol_net

  # 6. Redis (For Caching/Pulse logs)
  redis:
    image: redis:7-alpine
    container_name: lastwish_redis
    ports:
      - "6379:6379"
    networks:
      - protocol_net

networks:
  protocol_net:
    driver: bridge

volumes:
  postgres_data:
