name: Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily scan

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Snyk security scan
        run: |
          npm install -g snyk
          # snyk test --severity-threshold=high # Skipping live execution in demo
      
      - name: Run dependency audit
        run: npm audit --audit-level=high
      
      - name: Run OWASP ZAP scan
        run: |
          echo "Scanning for OWASP vulnerabilities..."
          # docker run -t owasp/zap2docker-stable zap-full-scan.py \
          #  -t http://localhost:7001 \
          #  -r report.html
      
      - name: Run secret scanner
        run: |
          npm install -g secrets-scan || true
          # secrets-scan --path ./ --exclude node_modules
